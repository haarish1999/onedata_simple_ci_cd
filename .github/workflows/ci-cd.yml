name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

  checkout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

  lint:
    runs-on: ubuntu-latest
    needs: checkout
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: pip install flake8
      - run: flake8 .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11
      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - run: docker build -t $IMAGE_NAME:$IMAGE_TAG .
      - run: docker push $IMAGE_NAME:$IMAGE_TAG
      # Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Store image URI in SSM
      - name: Store Image URI in SSM
        run: |
          aws ssm put-parameter \
            --name "/cicd/simple-api/image-uri" \
            --value "$IMAGE_NAME:$IMAGE_TAG" \
            --type "String" \
            --overwrite

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    environment:
      name: staging

    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create cluster
        run: kind create cluster

      - name: Verify cluster
        run: kubectl get nodes

      #  Pull image from GHCR
      - name: Pull Docker image
        run: docker pull $IMAGE_NAME:$IMAGE_TAG

      #  Load image into kind cluster
      - name: Load image into kind
        run: kind load docker-image $IMAGE_NAME:$IMAGE_TAG

      #  Replace full image reference in deployment
      - name: Update deployment image
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_NAME:$IMAGE_TAG|g" k8s/deployment.yaml

      # Deploy manifests
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      #  Wait for rollout
      - name: Wait for rollout
        run: kubectl rollout status deployment/simple-api

      #  Verify resources
      - name: Verify deployment
        run: |
          kubectl get all
      - name: Test Application
        run: |
          kubectl port-forward service/simple-api 8080:80 &
          sleep 5
          curl -f http://localhost:8080 || exit 1

      #  Rollback only if deployment exists AND failure happens
      - name: Rollback on failure
        if: failure()
        run: |
          if kubectl get deployment simple-api; then
            kubectl rollout undo deployment/simple-api
          else
            echo "Deployment not found. Skipping rollback."
          fi  

