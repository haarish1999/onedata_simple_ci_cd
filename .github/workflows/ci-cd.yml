name: CI-CD

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  checkout:
    name: Checkout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: .
          if-no-files-found: error

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [checkout]
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source
          path: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  unit_test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source
          path: .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test

  docker_build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit_test]
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source
          path: .

      - name: Build image (tag = git SHA)
        run: |
          docker build -t "${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Save image to artifact
        run: |
          docker save "${IMAGE_NAME}:${IMAGE_TAG}" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          if-no-files-found: error

  push:
    name: Push Image (GHCR)
    runs-on: ubuntu-latest
    needs: [docker_build]
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: .

      - name: Load image
        run: docker load -i image.tar

      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push (tag = git SHA)
        run: docker push "${IMAGE_NAME}:${IMAGE_TAG}"

  deploy:
    name: Deploy to kind (kubectl apply)
    runs-on: ubuntu-latest
    needs: [push]
    environment:
      name: staging   # <-- Manual approval gate is configured in GitHub Environment settings
    steps:
      - name: Download source artifact
        uses: actions/download-artifact@v4
        with:
          name: source
          path: .

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: cicd-kind

      - name: Create namespace
        run: kubectl create ns staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GHCR imagePullSecret in cluster
        run: |
          kubectl -n staging delete secret ghcr-secret --ignore-not-found
          kubectl -n staging create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ github.token }}"

      - name: Render deployment manifest with SHA image tag
        env:
          FULL_IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
        run: |
          sed "s|IMAGE_PLACEHOLDER|${FULL_IMAGE}|g" k8s/deployment.yaml > /tmp/deployment.yaml
          echo "Using image: ${FULL_IMAGE}"
          cat /tmp/deployment.yaml

      - name: kubectl apply (Deployment + Service)
        run: |
          kubectl -n staging apply -f /tmp/deployment.yaml
          kubectl -n staging apply -f k8s/service.yaml

      - name: Verify rollout
        run: kubectl -n staging rollout status deploy/simple-api --timeout=120s